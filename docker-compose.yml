services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: team-chat:latest
    container_name: team-chat
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=maverick-secret-2024
      - DB_PATH=/data/chat.db
    volumes:
      - team_chat_data:/data
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - "traefik.http.routers.team-chat.rule=Host(`team-chat.srv1669884.hstgr.cloud`)"
      - traefik.http.routers.team-chat.tls=true
      - traefik.http.routers.team-chat.entrypoints=web,websecure
      - traefik.http.routers.team-chat.tls.certresolver=mytlschallenge
      - traefik.http.services.team-chat.loadbalancer.server.port=3000
volumes:
  team_chat_data:
networks:
  traefik:
    external: true
    name: n8n_default
