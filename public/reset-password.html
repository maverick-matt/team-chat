<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maverick Hub – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#FFFFFF;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#FFFFFF;border-radius:20px;padding:36px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(13,30,53,.12)}
    .logo-wrap{text-align:center;margin-bottom:24px}
    .logo-wrap .main-logo{width:160px;height:auto;display:block;margin:0 auto}
    h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#0D1E35;margin-bottom:8px}
    .sub{font-size:13px;color:#7A96B8;margin-bottom:20px;line-height:1.5}
    label{display:block;font-size:11px;font-weight:700;color:#1C3B6E;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .field{margin-bottom:14px}
    input{width:100%;border:1px solid #d1d9e8;border-radius:8px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;color:#0D1E35}
    input:focus{border-color:#2B5EA7;box-shadow:0 0 0 3px rgba(43,94,167,.12)}
    input::placeholder{color:#7A96B8}
    button{width:100%;background:linear-gradient(135deg,#2B5EA7,#1C3B6E);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:10px;padding:12px;cursor:pointer;transition:opacity .2s;margin-top:4px}
    button:hover{opacity:.9}
    button:disabled{opacity:.6;cursor:not-allowed}
    .error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#EF4444;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
    .success{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#059669;border-radius:8px;padding:14px;font-size:13px;margin-bottom:14px;display:none;line-height:1.6}
    .invalid{text-align:center;padding:20px 0}
    .invalid .icon{font-size:40px;margin-bottom:10px}
    .back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:#2B5EA7;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
    @media(max-width:480px){body{align-items:flex-start;padding:20px 14px}.card{padding:28px 20px}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/images/maverick-logo-original.png" alt="Maverick Campers" class="main-logo">
    </div>
    <div id="content"></div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');

    function renderInvalid() {
      document.getElementById('content').innerHTML = `
        <div class="invalid">
          <div class="icon">🔗</div>
          <h2>Link Invalid or Expired</h2>
          <p class="sub">This password reset link is invalid or has already been used. Please request a new one from the login page.</p>
          <a class="back-link" href="/">Back to Login</a>
        </div>`;
    }

    function renderForm() {
      document.getElementById('content').innerHTML = `
        <h2>Set New Password</h2>
        <p class="sub">Choose a strong password for your Maverick Hub account.</p>
        <div class="error" id="err"></div>
        <div class="success" id="suc"></div>
        <div id="formFields">
          <div class="field">
            <label>New Password</label>
            <input type="password" id="pw1" placeholder="Min. 6 characters" autocomplete="new-password"/>
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password"/>
          </div>
          <button id="submitBtn" onclick="submitReset()">Set Password →</button>
        </div>
        <a class="back-link" href="/">Back to Login</a>`;
    }

    async function submitReset() {
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('err');
      err.style.display = 'none';
      if (pw1.length < 6) { showErr('Password must be at least 6 characters'); return; }
      if (pw1 !== pw2) { showErr('Passwords do not match'); return; }
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        const res = await fetch('/api/reset-password', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, password: pw1})});
        const data = await res.json();
        if (!res.ok) { showErr(data.error || 'Reset failed'); return; }
        document.getElementById('formFields').style.display = 'none';
        const suc = document.getElementById('suc');
        suc.innerHTML = '✓ Password updated successfully!<br><br><a href="/" style="color:#059669">Sign in with your new password →</a>';
        suc.style.display = 'block';
      } catch { showErr('Connection error. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Set Password →'; }
    }

    function showErr(msg) { const e = document.getElementById('err'); e.textContent = msg; e.style.display = 'block'; }

    if (!token) { renderInvalid(); } else { renderForm(); }
  </script>
</body>
</html>
